name: Release
on:
  push:
    branches: [main, next, beta, alpha]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Approve builds
        run: pnpm approve-builds --global esbuild sharp 2>/dev/null; true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts && npx husky

      - name: Build
        run: npx tsdown

      - name: Release
        run: npx --package semantic-release@25 --package @semantic-release/git semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
